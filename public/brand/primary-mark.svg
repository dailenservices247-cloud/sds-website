<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Synapse Dynamics Segmented — primary mark">
  <title>Synapse Dynamics — Primary Mark (Nodal Worm)</title>
  <!--
    Synapse Dynamics Segmented — Primary Mark v2 (LOCKED)
    Concept: Nodal Worm
    Reads as: worm + data pipeline + segmented architecture + lineage tree
    Colors: accent-primary #22C55E (green) with subtle spine connector
