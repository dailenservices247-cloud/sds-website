  <!-- Nodes: 9 tapering circles, head-heavy, tail-thin -->
  <circle cx="16"  cy="40" r="14"  fill="#22C55E"/>
  <circle cx="52"  cy="28" r="12"  fill="#22C55E"/>
  <circle cx="92"  cy="22" r="11"  fill="#22C55E"/>
  <circle cx="136" cy="28" r="10"  fill="#22C55E"/>
  <circle cx="180" cy="44" r="9"   fill="#22C55E"/>
  <circle cx="220" cy="56" r="8"   fill="#22C55E"/>
  <circle cx="255" cy="52" r="6.5" fill="#22C55E"/>
  <circle cx="283" cy="44" r="4.75" fill="#22C55E"/>
  <circle cx="305" cy="40" r="3"   fill="#22C55E"/>
