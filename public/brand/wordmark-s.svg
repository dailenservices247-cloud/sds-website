<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 100" width="60" height="100" role="img" aria-label="Synapse Dynamics — wordmark S">
  <title>Synapse Dynamics — Wordmark S (inline letterform)</title>
  <!--
    Synapse Dynamics Segmented — Inline Wordmark S v1
    Purpose: the "S" in "Synapse" — a custom letterform that IS the logo.
