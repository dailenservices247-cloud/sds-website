<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="Synapse Dynamics Segmented — monogram">
  <title>Synapse Dynamics — Monogram (Mono-S Coil)</title>
  <!--
    Synapse Dynamics Segmented — Monogram v2 (LOCKED)
    Concept: Mono-S Coil
    Reads as: letter S formed from a coiled worm with segment rings
    Colors: accent-primary #22C55E (green) on transparent background
    Usage: all square/circular contexts. Favicon 16/32/180/192/512,
    app icons, browser tabs, Instagram/Twitter/LinkedIn avatars, Gmail sender avatar.
    For horizontal / wordmark contexts, use sds-logo-primary-mark.svg instead.
  -->
  <!-- S-shaped worm body: single thick stroke, rounded caps -->
  <path
    d="M 60 18
       Q 60 10, 48 10
       L 32 10
       Q 20 10, 20 22
       Q 20 34, 32 34
       L 48 34
       Q 60 34, 60 46
       Q 60 58, 48 58
       L 32 58
       Q 20 58, 20 70"
    fill="none"
    stroke="#22C55E"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Segment rings: thin dark perpendicular lines cutting across the S body -->
  <!-- Top bar segments -->
  <line x1="32" y1="4"  x2="32" y2="16" stroke="#0A0F0C" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="44" y1="4"  x2="44" y2="16" stroke="#0A0F0C" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Middle bar segments -->
  <line x1="32" y1="28" x2="32" y2="40" stroke="#0A0F0C" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="44" y1="28" x2="44" y2="40" stroke="#0A0F0C" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Bottom bar segments -->
  <line x1="32" y1="52" x2="32" y2="64" stroke="#0A0F0C" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="44" y1="52" x2="44" y2="64" stroke="#0A0F0C" stroke-width="1.75" stroke-linecap="round"/>
</svg>
